name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled recipe images (seed JSON + files)
        run: npm run images:verify

      # Block PRs introducing known-critical dependency issues (transitives may remain moderate/high until upstream bumps).
      - name: Dependency audit (critical severity)
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test (with coverage + thresholds)
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Bundle size budget
        run: npm run test:bundle-size

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 45
    # One job per browser: the combined 192-test single-worker run outgrew the
    # 45-minute budget and was cancelled on every recent run (main included).
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install Firebase CLI
        run: |
          for attempt in 1 2 3; do
            npm install -g firebase-tools && exit 0
            echo "::warning::firebase-tools install failed (attempt $attempt); retrying"
            sleep $((attempt * 15))
          done
          echo "::error::firebase-tools install failed after 3 attempts"
          exit 1

      - name: Prepare Firebase emulators
        run: |
          for attempt in 1 2 3; do
            firebase setup:emulators:firestore && firebase setup:emulators:storage && exit 0
            echo "::warning::emulator download failed (attempt $attempt); retrying"
            sleep $((attempt * 15))
          done
          echo "::error::emulator download failed after 3 attempts"
          exit 1

      - name: Start Firebase emulators
        run: firebase emulators:start --only firestore,storage --project demo-schafer &
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Wait for emulators
        run: npx wait-on tcp:8080 tcp:9199 --timeout 30000

      - name: E2E (${{ matrix.browser }})
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true
          VITE_FIREBASE_USE_EMULATOR: "true"
          VITE_FIRESTORE_EMULATOR_HOST: "localhost:8080"
          VITE_STORAGE_EMULATOR_HOST: "localhost:9199"

  firestore-rules:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install Firebase CLI
        run: |
          for attempt in 1 2 3; do
            npm install -g firebase-tools && exit 0
            echo "::warning::firebase-tools install failed (attempt $attempt); retrying"
            sleep $((attempt * 15))
          done
          echo "::error::firebase-tools install failed after 3 attempts"
          exit 1

      - name: Prepare Firestore emulator
        run: |
          for attempt in 1 2 3; do
            firebase setup:emulators:firestore && exit 0
            echo "::warning::Firestore emulator download failed (attempt $attempt); retrying"
            sleep $((attempt * 15))
          done
          echo "::error::Firestore emulator download failed after 3 attempts"
          exit 1

      - name: Firestore security rules tests
        run: firebase emulators:exec --only firestore --project demo-schafer "npm run test:rules"
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
