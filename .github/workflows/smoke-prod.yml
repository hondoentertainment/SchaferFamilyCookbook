name: Smoke production

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  prod-smoke:
    # Only smoke-test live URLs after a successful push build on main (avoids noisy PR forks).
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      # GitHub Pages deploy runs in parallel after CI; large assets can 503 briefly.
      - name: Wait for Pages propagation
        run: sleep 45
      - name: Production smoke URLs
        run: npm run smoke:prod
