name: Lighthouse CI

on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'Full URL to audit (include trailing slash if desired)'
        required: true
        default: 'https://schafer-family-cookbook.vercel.app/'
        type: string

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse
        env:
          LHCI_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.url || 'https://schafer-family-cookbook.vercel.app/' }}
        run: npx --yes @lhci/cli@0.14.0 autorun

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results-${{ github.run_number }}
          path: .lighthouseci
          retention-days: 14
