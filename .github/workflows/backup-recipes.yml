name: Backup recipes JSON

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Write timestamped copy of seed recipes
        run: node scripts/backup-recipes-json.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: recipes-seed-${{ github.run_number }}-${{ github.sha }}
          path: backups/
          retention-days: 90
